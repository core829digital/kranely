<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1C1A18" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- SEO -->
    <title>Kranely | Window & Door Management Platform</title>
    <meta name="description" content="Kranely — The all-in-one management platform for window and door installers. Manage clients, quotes, projects, payments and suppliers in one place." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://app.kranely.com/" />
    <meta property="og:title" content="Kranely | Window & Door Management Platform" />
    <meta property="og:description" content="Kranely — The all-in-one management platform for window and door installers." />
    <meta property="og:image" content="https://app.kranely.com/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kranely | Window & Door Management Platform" />
    <meta name="twitter:description" content="Kranely — The all-in-one management platform for window and door installers." />
    <meta name="twitter:image" content="https://app.kranely.com/og-image.png" />

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <style>
      body { margin: 0; background: #1C1A18; }
      #initial-loader {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #1C1A18; z-index: 9999;
      }
      #initial-loader .spinner {
        width: 2rem; height: 2rem; border-radius: 50%;
        border: 3px solid rgba(255,199,3,0.15);
        border-top-color: #FFC703;
        animation: spin 0.75s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <div id="initial-loader">
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
